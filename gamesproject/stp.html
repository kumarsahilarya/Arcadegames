<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Stone Paper Scissors Game</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            text-align: center;
            background: linear-gradient(135deg, #6dd5ed, #2193b0);
            color: white;
        }

        #startScreen {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            animation: fadeIn 2s;
        }

        #game {
            display: none;
            padding: 20px;
        }

        h1 {
            font-size: 40px;
        }

        button {
            padding: 12px 25px;
            margin: 10px;
            font-size: 18px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            background: #222;
            color: white;
        }

        button:hover {
            background: black;
        }

        select {
            padding: 10px;
            font-size: 16px;
            border-radius: 6px;
        }

        .table {
            width: 300px;
            height: 120px;
            background: #8b4513;
            margin: auto;
            margin-top: 40px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
        }

        .players {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 40px;
            gap: 50px;
        }

        .playerBox {
            width: 180px;
            height: 180px;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 70px;
            animation: idle 2s infinite;
        }

        .user {
            background: #004cff;
        }

        .bot {
            background: #00a651;
        }

        .scoreboard {
            margin-top: 20px;
            font-size: 22px;
            font-weight: bold;
        }

        #roundStatus {
            margin-top: 20px;
            font-size: 22px;
        }

        .controls {
            margin-top: 30px;
        }

        .celebration {
            font-size: 40px;
            animation: pop 1s infinite alternate;
        }

        @keyframes fadeIn {
            from {
                opacity: 0
            }

            to {
                opacity: 1
            }
        }

        @keyframes pop {
            from {
                transform: scale(1)
            }

            to {
                transform: scale(1.2)
            }
        }

        @keyframes idle {
            0% {
                transform: translateY(0)
            }

            50% {
                transform: translateY(-8px)
            }

            100% {
                transform: translateY(0)
            }
        }

        @keyframes shake {
            0% {
                transform: translateX(0)
            }

            25% {
                transform: translateX(-5px)
            }

            50% {
                transform: translateX(5px)
            }

            75% {
                transform: translateX(-5px)
            }

            100% {
                transform: translateX(0)
            }
        }

        .shake {
            animation: shake 0.4s;
        }

        #gameOverScreen {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.85);
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            animation: fadeIn 0.5s;
        }

        .modal-content {
            background: linear-gradient(135deg, #1f1c2c, #928DAB);
            padding: 50px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
            animation: dropIn 0.8s cubic-bezier(0.25, 1.5, 0.5, 1);
        }

        #winnerText {
            font-size: 50px;
            margin-bottom: 20px;
            font-weight: bold;
            color: #ffd700;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.8), 0 0 20px rgba(255, 215, 0, 0.6);
            animation: pop 1s infinite alternate;
        }

        .finalScores {
            font-size: 24px;
            margin-bottom: 30px;
            color: white;
        }

        @keyframes dropIn {
            0% { transform: translateY(-100vh) scale(0.5); opacity: 0; }
            100% { transform: translateY(0) scale(1); opacity: 1; }
        }

        .winPulse {
            animation: winPulse 0.5s ease-out;
        }

        @keyframes winPulse {
            0% { transform: scale(1); box-shadow: 0 0 0 rgba(255, 255, 255, 0.7); }
            50% { transform: scale(1.1); box-shadow: 0 0 20px rgba(255, 255, 255, 0.9); }
            100% { transform: scale(1); box-shadow: 0 0 0 rgba(255, 255, 255, 0); }
        }
    </style>
</head>

<body>
    <div id="startScreen">
        <h1>🎮 Welcome to Stone Paper Scissors</h1>
        <p>Select Difficulty and Press Start</p><select id="difficulty">
            <option value="easy">Easy</option>
            <option value="medium">Medium</option>
            <option value="hard">Hard</option>
        </select><br><br> <button onclick="startGame()">🚀 Start Game</button>

    </div>
    <div id="game">
        <h1>Stone Paper Scissors Arena</h1>
        <div class="scoreboard">
            User: <span id="userScore">0</span> | Bot: <span id="botScore">0</span>
        </div>
        <div class="players">
            <div class="playerBox user">
                <div>👤</div>
                <div id="userMove">❔</div>
            </div>
            <div class="table">Game Table</div>
            <div class="playerBox bot">
                <div>🤖</div>
                <div id="botMove">❔</div>
            </div>
        </div>
        <div class="controls">
            <button onclick="play('Stone')">✊ Stone</button>
            <button onclick="play('Paper')">✋ Paper</button>
            <button onclick="play('Scissors')">✌ Scissors</button>
        </div>
        <div id="roundStatus">Round Status</div>
    </div>
    <div id="gameOverScreen">
        <div class="modal-content">
            <div id="winnerText">🏆 USER WINS!</div>
            <div class="finalScores">
                User: <span id="finalUserScore">0</span> | Bot: <span id="finalBotScore">0</span>
            </div>
            <button onclick="restartGame()">🔄 Play Again</button>
        </div>
    </div>
    <script>

        let userScore = 0
        let botScore = 0
        let gameOver = false

        function startGame() {

            document.getElementById("startScreen").style.display = "none"
            document.getElementById("game").style.display = "block"

        }

        function icon(move) {
            if (move == "Stone") return "✊"
            if (move == "Paper") return "✋"
            return "✌"
        }

        function randomMove() {
            const arr = ["Stone", "Paper", "Scissors"]
            return arr[Math.floor(Math.random() * 3)]
        }

        function counterMove(user) {
            if (user == "Stone") return "Paper"
            if (user == "Paper") return "Scissors"
            return "Stone"
        }

        function play(userMove) {

            if (gameOver) return

            const difficulty = document.getElementById("difficulty").value

            let botMove

            if (difficulty == "easy") {
                botMove = randomMove()
            }
            else if (difficulty == "medium") {
                botMove = Math.random() < 0.5 ? randomMove() : counterMove(userMove)
            }
            else {
                botMove = counterMove(userMove)
            }

            document.getElementById("userMove").innerText = icon(userMove)
            document.getElementById("botMove").innerText = icon(botMove)

            document.getElementById("userMove").classList.add("shake")
            document.getElementById("botMove").classList.add("shake")

            setTimeout(() => {
                document.getElementById("userMove").classList.remove("shake")
                document.getElementById("botMove").classList.remove("shake")
            }, 400)

            let result = ""

            if (userMove == botMove) {
                userScore++
                botScore++
                result = "Draw round! Both get 1 point"
            }

            else if (
                (userMove == "Stone" && botMove == "Scissors") ||
                (userMove == "Paper" && botMove == "Stone") ||
                (userMove == "Scissors" && botMove == "Paper")
            ) {
                userScore++
                result = "User wins this round!"
                document.querySelector(".user").classList.add("winPulse");
                setTimeout(() => document.querySelector(".user").classList.remove("winPulse"), 500);
            }

            else {
                botScore++
                result = "Bot wins this round!"
                document.querySelector(".bot").classList.add("winPulse");
                setTimeout(() => document.querySelector(".bot").classList.remove("winPulse"), 500);
            }

            document.getElementById("userScore").innerText = userScore
            document.getElementById("botScore").innerText = botScore

            document.getElementById("roundStatus").innerText = result

            if (userScore >= 5 || botScore >= 5) {

                gameOver = true

                if (userScore > botScore) {
                    document.getElementById("roundStatus").innerHTML = "🏆 USER WINS THE GAME!"
                }
                else if (botScore > userScore) {
                    document.getElementById("roundStatus").innerHTML = "🤖 BOT WINS THE GAME!"
                }
                else {
                    document.getElementById("roundStatus").innerHTML = "🤝 IT'S A MATCH TIE!"
                }
                document.getElementById("roundStatus").classList.add("celebration")

                setTimeout(() => {
                    document.getElementById("game").style.display = "none";
                    document.getElementById("gameOverScreen").style.display = "flex";
                    
                    let winnerMsg = "";
                    if (userScore > botScore) winnerMsg = "🏆 USER WINS!";
                    else if (botScore > userScore) winnerMsg = "🤖 BOT WINS!";
                    else winnerMsg = "🤝 IT'S A MATCH TIE!";
                    
                    document.getElementById("winnerText").innerText = winnerMsg;
                    document.getElementById("finalUserScore").innerText = userScore;
                    document.getElementById("finalBotScore").innerText = botScore;
                }, 1000);

            }

        }

        function restartGame() {
            userScore = 0;
            botScore = 0;
            gameOver = false;
            document.getElementById("userScore").innerText = "0";
            document.getElementById("botScore").innerText = "0";
            document.getElementById("userMove").innerText = "❔";
            document.getElementById("botMove").innerText = "❔";
            document.getElementById("roundStatus").innerText = "Round Status";
            document.getElementById("roundStatus").classList.remove("celebration");
            document.getElementById("gameOverScreen").style.display = "none";
            document.getElementById("startScreen").style.display = "flex";
        }

    </script>
</body>

</html>
